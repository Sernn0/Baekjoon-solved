name: Update Stats

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * *'   # KST 00:00 매일 자동 갱신

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install matplotlib requests numpy scipy
          sudo apt-get install -y fonts-jetbrains-mono
          fc-cache -fv

      - name: Generate stats SVGs
        run: python scripts/generate_stats.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/ data/
          git diff --staged --quiet || git commit -m "chore: update stats [skip ci]"
          git push
